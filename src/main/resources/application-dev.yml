spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/rentgo
    username: root
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
